name: build-latest-release
on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if image already exists'
        required: false
        default: 'false'
  schedule:
    - cron: "0 2 * * 2"

env:
  IMAGE_NAME: sourcebans

jobs:
  get-release-tag:
    runs-on: ubuntu-24.04
    outputs:
      release-tag: ${{ steps.get-release-tag.outputs.release-tag }}
      should-build: ${{ steps.check-existing.outputs.should-build }}
    steps:
      - name: Get latest sbpp release
        id: get-release-tag
        run: |
          echo "release-tag=$(curl https://api.github.com/repos/sbpp/sourcebans-pp/releases/latest -s | jq -r '.tag_name')" >> $GITHUB_OUTPUT

      - name: Check if image already exists on Docker Hub
        id: check-existing
        run: |
          RELEASE_TAG=${{ steps.get-release-tag.outputs.release-tag }}
          FORCE=${{ github.event.inputs.force_build || 'false' }}
          
          if [ "$FORCE" = "true" ]; then
            echo "Force build requested, skipping existence check"
            echo "should-build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}/tags/${RELEASE_TAG}")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Image $RELEASE_TAG already exists, skipping build"
            echo "should-build=false" >> $GITHUB_OUTPUT
          else
            echo "Image $RELEASE_TAG not found, build needed"
            echo "should-build=true" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    runs-on: ubuntu-24.04
    needs: get-release-tag
    if: needs.get-release-tag.outputs.should-build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          RELEASE_TAG: ${{ needs.get-release-tag.outputs.release-tag }}
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: CHECKOUT=${{ env.RELEASE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-amd64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: get-release-tag
    if: needs.get-release-tag.outputs.should-build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          RELEASE_TAG: ${{ needs.get-release-tag.outputs.release-tag }}
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: CHECKOUT=${{ env.RELEASE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-arm64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest-arm64

  create-manifests:
    runs-on: ubuntu-24.04
    needs: [get-release-tag, build-amd64, build-arm64]
    if: needs.get-release-tag.outputs.should-build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Create manifest for release tag and push
        env:
          RELEASE_TAG: ${{ needs.get-release-tag.outputs.release-tag }}
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-arm64

      - name: Create latest manifest and push
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest-arm64
